IMAGE_NAME="mistral-coder"
TAG="latest"
CLI_COMMAND="vibe"
ENV_VARS=("MISTRAL_API_KEY")
VOLUMES=(
  "-v" "agentic-coder-vibe:/home/node/.vibe"
)
LOG_PATH="logs/**/*.log"
TROUBLESHOOTING_TIP="Since no MISTRAL_API_KEY is detected in your environment, the container relies on config files in the agentic-coder-vibe volume. If this is a new setup or your key is missing/expired, please run the agent in interactive mode first: run-agent.sh -c mistral ."
