IMAGE_NAME="claude-coder"
TAG="latest"
CLI_COMMAND="claude"
VERBOSE_FLAG="--verbose"
STREAM_FORMATTER="claude/stream-formatter.py"
CLI_ARGS=("--permission-mode" "bypassPermissions")
ENV_VARS=("ANTHROPIC_API_KEY")
VOLUMES=(
  "-v" "agentic-coder-claude:/home/node/.claude"
)
TROUBLESHOOTING_TIP="Since you are using Google/Anthropic OAuth (no ANTHROPIC_API_KEY detected), the session token inside the Docker volume may have expired or is missing. Please run the agent in interactive TUI mode first to complete the authentication flow: run-agent.sh -c claude ."
