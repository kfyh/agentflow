IMAGE_NAME="agentic-coder"
TAG="latest"
CLI_COMMAND="agy"
ENV_VARS=("GEMINI_API_KEY")
VOLUMES=(
  "-v" "agentic-coder-gemini:/home/node/.gemini"
  "-v" "agentic-coder-config:/home/node/.config"
)
TROUBLESHOOTING_TIP="Since you are using Google One OAuth (no GEMINI_API_KEY detected), the session token inside the Docker volume may have expired or is missing. Please run the agent in interactive TUI mode first to complete the authentication flow: run-agent.sh -c gemini ."
