name: CI Pipeline

on:
  push:
    branches: [ "main", "master", "**" ]
  pull_request:
    branches: [ "main", "master", "**" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Claude Coder Image
        uses: docker/build-push-action@v5
        with:
          context: ./claude
          tags: claude-coder:latest
          load: true
          cache-from: type=gha,scope=claude
          cache-to: type=gha,mode=max,scope=claude

      - name: Build Gemini Coder Image
        uses: docker/build-push-action@v5
        with:
          context: ./gemini
          tags: agentic-coder:latest
          load: true
          cache-from: type=gha,scope=gemini
          cache-to: type=gha,mode=max,scope=gemini

      - name: Build Mistral Coder Image
        uses: docker/build-push-action@v5
        with:
          context: ./mistral
          tags: mistral-coder:latest
          load: true
          cache-from: type=gha,scope=mistral
          cache-to: type=gha,mode=max,scope=mistral

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Make runner script executable
        run: chmod +x run-agent.sh

      - name: Run unit tests
        run: python3 -m unittest discover -s test
